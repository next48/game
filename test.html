        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #272a35;

        .shadow-2xl, .shadow-xl, .shadow-lg, .shadow-md, .shadow-sm {
            box-shadow: 4px 4px 0px #000000 !important;
        }
        .shadow-inner {
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.6) !important;
        }
        .drop-shadow-md, .drop-shadow-lg {
            filter: drop-shadow(4px 4px 0px #000000) !important;
        }
        
        * { border-radius: 6px !important; }
        .rounded-full { border-radius: 50% !important; } 

        canvas { image-rendering: pixelated; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; border-left: 2px solid #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4a5568; border: 2px solid #000; }
        
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }
        .animate-float-up { animation: float-up 1.5s ease-out forwards; }
        
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes spin-fast { 100% { transform: rotate(360deg); } }
        
        @keyframes jackpot-flash {
            0%, 100% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.5); transform: scale(1.1); }
        }
        .animate-jackpot { animation: jackpot-flash 0.5s ease-in-out infinite; }

        /* АНИМАЦИЯ ЛАПКИ КОТА */
        @keyframes cat-scratch {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-40deg) translateY(-10px); }
            100% { transform: rotate(0deg); }
        }
        .animate-cat-scratch { animation: cat-scratch 0.25s infinite; }
    </style>
</head>

const INITIAL_UPGRADES = {
  luck: { level: 0, max: 5, cost: 300, name: 'АУРА ПОБЕДИТЕЛЯ', icon: 'clover', color: 'text-green-400' },

  fan_speed: { level: 0, max: 5, cost: 150, name: 'ТУРБО-СДУВ', icon: 'fan', color: 'text-blue-400' },
  fan_battery: { level: 0, max: 5, cost: 250, name: 'БАТАРЕЙКА ИЗ ПУЛЬТА', icon: 'zap', color: 'text-yellow-400' },
  robot_capacity: { level: 0, max: 5, cost: 200, name: 'ШИРОКИЕ КАРМАНЫ', icon: 'bot', color: 'text-gray-400' },
  robot_speed: { level: 0, max: 5, cost: 200, name: 'МАСЛО ДЛЯ ШЕСТЕРЕНОК', icon: 'zap', color: 'text-yellow-500' },
  cat_duration: { level: 0, max: 5, cost: 300, name: 'КОФЕИН ДЛЯ КОТА', icon: 'clock', color: 'text-pink-400' },
  cat_speed: { level: 0, max: 5, cost: 400, name: 'ОЗВЕРИН', icon: 'zap', color: 'text-orange-500' }
};

const INITIAL_TICKET_EXP = { plate: 0, ticket_2win: 0, ticket_mini: 0, ticket_apple: 0, ticket_quick: 0, ticket_cat: 0 };

// --- СОСТОЯНИЕ (STATE) ---
let state = {
    money: 0,
    itemsOnTable: [],
    floatingTexts: [],
    unlockedItems: ['plate'],
    unlockedGadgets: ['trash'],
    scratchedCount: 0,
    upgrades: JSON.parse(JSON.stringify(INITIAL_UPGRADES)),
    ticketExp: JSON.parse(JSON.stringify(INITIAL_TICKET_EXP)),
    phoneState: 'idle',
    phoneDialog: 0,
    currentPhoneMsg: '',
    isFanActive: false,
    fanAutoTimer: 0,
    leftTab: 'tickets',
    robotQueue: [],
    catState: 'sleeping',
    catTimer: 0,
    catMaxTimer: 0,
    catTargetUid: null,
    catProgress: 0,
    activeScratchItem: null,
    draggedItem: null
};

let cheatBuffer = '';

// --- СОХРАНЕНИЕ И ЗАГРУЗКА ---
function saveGame() {
    const data = {
        money: state.money, unlockedItems: state.unlockedItems, unlockedGadgets: state.unlockedGadgets,
        scratchedCount: state.scratchedCount, upgrades: state.upgrades, ticketExp: state.ticketExp
    };
    localStorage.setItem('scritchy_save_pixel_v4', JSON.stringify(data));
}

function loadGame() {
    const save = localStorage.getItem('scritchy_save_pixel_v4');
    if (save) {
        try {
            const data = JSON.parse(save);
            state.money = data.money || 0;
            state.unlockedItems = data.unlockedItems || ['plate'];
            state.unlockedGadgets = data.unlockedGadgets || ['trash'];
            state.scratchedCount = data.scratchedCount || 0;
            for (let k in INITIAL_UPGRADES) {
                if (data.upgrades && data.upgrades[k]) {
                    state.upgrades[k].level = data.upgrades[k].level;
                    state.upgrades[k].cost = data.upgrades[k].cost;
                }
            }
            if (data.ticketExp) state.ticketExp = { ...INITIAL_TICKET_EXP, ...data.ticketExp };
        } catch(e) {}
    }
}

// --- РАСЧЕТ УРОВНЕЙ БИЛЕТОВ ---
function getTicketLevel(id) {
    const exp = state.ticketExp[id] || 0;
    if (exp >= 50) return 5;
    if (exp >= 25) return 4;
    if (exp >= 10) return 3;
    if (exp >= 3) return 2;
    return 1;
}

function getNextLevelReq(id) {
    const exp = state.ticketExp[id] || 0;
    if (exp < 3) return 3;
    if (exp < 10) return 10;
    if (exp < 25) return 25;
    if (exp < 50) return 50;
    return 'MAX';
}

// --- ЗВУКОВАЯ СИСТЕМА ---
let audioCtx = null;
let scratchOsc = null;
let scratchGain = null;
let phoneRingInterval = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'click') {
            osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'buy') {
            osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.05);
            gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'win') {
            osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.setValueAtTime(500, now + 0.1);
            osc.frequency.setValueAtTime(700, now + 0.2); osc.frequency.setValueAtTime(900, now + 0.3);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'lose') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'jackpot') {
            osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(800, now + 0.2); osc.frequency.setValueAtTime(1000, now + 0.3); osc.frequency.setValueAtTime(1200, now + 0.4);
            gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 1.0);
            osc.start(now); osc.stop(now + 1.0);
        } else if (type === 'ring') {
            osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.setValueAtTime(800, now + 0.05);
            osc.frequency.setValueAtTime(600, now + 0.1); osc.frequency.setValueAtTime(800, now + 0.15);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.25);
            osc.start(now); osc.stop(now + 0.25);
        }
    } catch (e) {}
}

function startScratchSound() {
    if (scratchGain) return;
    try {
        initAudio();
        const bufferSize = audioCtx.sampleRate * 1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        scratchOsc = audioCtx.createBufferSource();
        scratchOsc.buffer = buffer; scratchOsc.loop = true;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 1500; filter.Q.value = 2; 
        
        scratchGain = audioCtx.createGain();
        scratchGain.gain.setValueAtTime(0, audioCtx.currentTime);
        scratchGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
        
        scratchOsc.connect(filter); filter.connect(scratchGain); scratchGain.connect(audioCtx.destination);
        scratchOsc.start();
    } catch(e) {}
}

function stopScratchSound() {
    if (scratchGain) {
        const gain = scratchGain; const osc = scratchOsc;
        scratchGain = null; scratchOsc = null;
        try {
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            setTimeout(() => { try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch(e){} }, 150);
        } catch(e) {}
    }
}

// --- ИНИЦИАЛИЗАЦИЯ ---
function init() {
    loadGame(); 
    bindEvents();
    renderAll();
    requestAnimationFrame(gameLoop);
    setInterval(() => {
        if(state.fanAutoTimer > 0) {
            state.fanAutoTimer--;
            renderGadgets(); 
        }
    }, 1000);
}

function bindEvents() {
    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('pointerdown', initAudio, { once: true });

    document.getElementById('tab-tickets').addEventListener('click', () => { playSound('click'); state.leftTab = 'tickets'; renderShop(); });
    document.getElementById('tab-gadgets').addEventListener('click', () => { playSound('click'); state.leftTab = 'gadgets'; renderShop(); });
    document.getElementById('btn-reset').addEventListener('click', handleReset);
    
    elPhone.addEventListener('click', handlePhoneClick);
    
    elTableArea.addEventListener('pointerdown', handlePointerDown);
    document.addEventListener('pointermove', handlePointerMove);
    document.addEventListener('pointerup', handlePointerUp);
    
    document.getElementById('btn-close-modal').addEventListener('click', closeScratchModal);
    
    const canvas = document.getElementById('scratch-canvas');
    canvas.addEventListener('pointerdown', handleScratchStart);
    canvas.addEventListener('pointermove', handleScratchMove);
    canvas.addEventListener('pointerup', handleScratchEnd);
    canvas.addEventListener('pointerleave', handleScratchEnd);

    document.addEventListener('keydown', (e) => {
        if (!e.key) return;
        cheatBuffer += e.key.toLowerCase();
        if (cheatBuffer.length > 10) cheatBuffer = cheatBuffer.slice(-10);

        if (cheatBuffer.endsWith('ltymub')) {
            state.money += 100000;
            playSound('jackpot');
            renderStats();
            saveGame();
            const jp = document.getElementById('ui-jackpot');
            const originalHTML = jp.innerHTML;
            jp.innerHTML = `<h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-green-300 to-green-600 drop-shadow-[6px_6px_0_#000] animate-jackpot text-center uppercase tracking-widest leading-tight" style="-webkit-text-stroke: 4px black;">ЧИТ-КОД:<br>+100,000₽</h1>`;
            jp.classList.remove('hidden'); jp.classList.add('flex');
            setTimeout(() => { jp.classList.add('hidden'); jp.classList.remove('flex'); jp.innerHTML = originalHTML; }, 3000);
            cheatBuffer = '';
        }
    });
}

// --- ИГРОВАЯ ЛОГИКА ---
let lastTime = performance.now();
function gameLoop(time) {
    const dt = time - lastTime;
    lastTime = time;

    // --- ВЕНТИЛЯТОР ---
    const isFanRunning = state.isFanActive || state.fanAutoTimer > 0;
    const robotEl = document.getElementById('robot-bounds');
    
    if (isFanRunning && robotEl) {
        const rRect = robotEl.getBoundingClientRect();
        const tRect = elTableBounds.getBoundingClientRect();
        const tx = rRect.left - tRect.left + rRect.width / 2 - 35;
        const ty = rRect.top - tRect.top + 10;
        const cap = state.upgrades.robot_capacity.level + 1;

        let itemsToKeep = [];
        let newlyQueued = [];
        let itemsChanged = false;

        state.itemsOnTable.forEach(item => {
            if (item.scratched || item.waitingForReward || (state.draggedItem && state.draggedItem.uid === item.uid) || item.uid === state.catTargetUid) {
                itemsToKeep.push(item);
                return;
            }
            
            const dx = tx - item.x;
            const dy = ty - item.y;
            const dist = Math.hypot(dx, dy);

            if (dist < 15) {
                if (state.robotQueue.length + newlyQueued.length < cap) {
                    newlyQueued.push({ ...item, progress: 0 });
                    itemsChanged = true;
                } else {
                    itemsToKeep.push(item);
                }
            } else {
                const speed = 1.0 + (state.upgrades.fan_speed.level * 1.5);
                itemsToKeep.push({ ...item, x: item.x + (dx / dist) * speed, y: item.y + (dy / dist) * speed });
                itemsChanged = true;
            }
        });

        if (itemsChanged) {
            state.itemsOnTable = itemsToKeep;
            if (newlyQueued.length > 0) state.robotQueue.push(...newlyQueued);
            renderTableItems();
            renderGadgets();
        }
    }

    // --- РОБОТ ---
    if (state.robotQueue.length > 0) {
        const currentRobotRect = robotEl ? robotEl.getBoundingClientRect() : null;

        const firstIdx = state.robotQueue.findIndex(q => q.progress < 100);
        if (firstIdx !== -1) {
            const speed = 0.003 + (state.upgrades.robot_speed.level * 0.005);
            state.robotQueue[firstIdx].progress = Math.min(100, state.robotQueue[firstIdx].progress + speed * dt);
            renderGadgets(); 
        }
        
        const finishedIdx = state.robotQueue.findIndex(q => q.progress >= 100);
        if (finishedIdx !== -1 && currentRobotRect) {
            const finishedItem = state.robotQueue.splice(finishedIdx, 1)[0];
            const tRect = elTableBounds.getBoundingClientRect();
            
            state.itemsOnTable.push({
                ...finishedItem,
                x: currentRobotRect.left - tRect.left - 20 + (Math.random() * 40),
                y: currentRobotRect.top - tRect.top + currentRobotRect.height - 40 + (Math.random() * 20),
                scratched: true,
                waitingForReward: true
            });
            renderTableItems();
            renderGadgets();
        }
    }

    // --- АВТО-КОТ СБОРЩИК ---
    if (state.catState === 'awake') {
        state.catTimer -= (dt / 1000);
        
        const catEmoji = document.getElementById('cat-emoji');
        const catPaw = document.getElementById('cat-paw');
        const catTimerBar = document.getElementById('cat-timer-bar');
        
        if (catTimerBar) catTimerBar.style.width = `${(state.catTimer / state.catMaxTimer) * 100}%`;

        if (state.catTimer <= 0) {
            state.catState = 'sleeping';
            state.catTargetUid = null;
            state.catProgress = 0;
            if (catEmoji) catEmoji.innerText = '😴';
            if (catPaw) { catPaw.classList.add('hidden'); catPaw.classList.remove('animate-cat-scratch'); }
        } else {
            if (catEmoji && catEmoji.innerText !== '😺') catEmoji.innerText = '😺';
            
            if (!state.catTargetUid) {
                if (catPaw) { catPaw.classList.add('hidden'); catPaw.classList.remove('animate-cat-scratch'); }
                
                let closest = null;
                let minDist = Infinity;
                const catEl = document.getElementById('cat-module');
                if (catEl) {
                    const cRect = catEl.getBoundingClientRect();
                    const tRect = elTableBounds.getBoundingClientRect();
                    const cx = cRect.left - tRect.left + cRect.width/2;
                    const cy = cRect.top - tRect.top + cRect.height/2;

                    state.itemsOnTable.forEach(item => {
                        if (item.scratched && item.waitingForReward && (!state.draggedItem || item.uid !== state.draggedItem.uid)) {
                            const dist = Math.hypot(item.x - cx, item.y - cy);
                            if (dist < minDist) { minDist = dist; closest = item; }
                        }
                    });

                    if (closest) {
                        state.catTargetUid = closest.uid;
                        state.catProgress = 0;
                    }
                }
            } else {
                const target = state.itemsOnTable.find(i => i.uid === state.catTargetUid);
                if (target && target.scratched && target.waitingForReward && (!state.draggedItem || target.uid !== state.draggedItem.uid)) {
                    const catEl = document.getElementById('cat-module');
                    if (catEl) {
                        const cRect = catEl.getBoundingClientRect();
                        const tRect = elTableBounds.getBoundingClientRect();
                        const cx = cRect.left - tRect.left + cRect.width/2 - 35;
                        const cy = cRect.top - tRect.top + cRect.height/2 - 20;

                        const dx = cx - target.x;
                        const dy = cy - target.y;
                        const dist = Math.hypot(dx, dy);

                        if (dist > 15) {
                            target.x += dx * 0.1;
                            target.y += dy * 0.1;
                            if (catPaw) { catPaw.classList.add('hidden'); catPaw.classList.remove('animate-cat-scratch'); }
                            renderTableItems();
                        } else {
                            if (catPaw) { catPaw.classList.remove('hidden'); catPaw.classList.add('animate-cat-scratch'); }
                            const speed = 50 + (state.upgrades.cat_speed.level * 25);
                            state.catProgress += speed * (dt / 1000);
                            
                            target.x += (Math.random() * 4 - 2);
                            target.y += (Math.random() * 4 - 2);
                            renderTableItems(); 

                            if (state.catProgress >= 100) {
                                state.money += target.result.payout;
                                state.scratchedCount++;
                                state.ticketExp[target.templateId] = (state.ticketExp[target.templateId] || 0) + 1;
                                
                                createFloatingText(target.result.payout, cx + 35, cy - 20);
                                if(target.result.payout > 0) playSound('win'); else playSound('lose');
                                checkJackpot(target.result.payout, target);

                                state.itemsOnTable = state.itemsOnTable.filter(it => it.uid !== target.uid);
                                state.catTargetUid = null;
                                state.catProgress = 0;
                                
                                saveGame();
                                renderStats();
                                renderShop();
                                renderTableItems();
                            }
                        }
                    }
                } else {
                    state.catTargetUid = null; 
                }
            }
        }
    }

    // Проверка телефона
    const nextProg = PROGRESSION_STEPS.find(step => !state.unlockedItems.includes(step.unlock));
    if (nextProg && state.scratchedCount >= nextProg.count && state.phoneState === 'idle') {
        state.currentPhoneMsg = nextProg.msg;
        state.phoneState = 'ringing';
        renderPhone();
    }

    requestAnimationFrame(gameLoop);
}

// МАГАЗИН И ГЕНЕРАЦИЯ БИЛЕТОВ
function spawnItem(itemId) {
    const itemData = SHOP_ITEMS[itemId];
    if (state.money < itemData.cost) return;
    
    playSound('buy');
    state.money -= itemData.cost;
    saveGame(); 
    renderStats();

    const lvl = getTicketLevel(itemId);
    const mult = 1 + (lvl - 1) * 0.5;
    
    const luckLvl = state.upgrades.luck.level;
    const luckBonus = (state.scratchedCount * 0.0005) + (luckLvl * 0.05);

    let result = { win: false, payout: 0, symbols: [] };
    
    if (itemId === 'plate') {
      const isWin = Math.random() < Math.min(0.99, 0.90 + luckBonus);
      result.win = isWin; result.payout = isWin ? Math.floor(3 * mult) : Math.floor(-3 * mult);
    } else if (itemId === 'ticket_2win') {
      const r = Math.random(); let winSym = null;
      if (r < 0.02 + luckLvl*0.01 + luckBonus/10) winSym = SYMBOLS.DIAMOND;
      else if (r < 0.15 + luckLvl*0.02 + luckBonus/5) winSym = SYMBOLS.MONEY_BAG;
      else if (r < 0.40 + luckLvl*0.03 + luckBonus/2) winSym = SYMBOLS.CASH;
      else if (r < 0.60 + luckBonus) winSym = SYMBOLS.CHERRY;
      
      if (winSym) {
        result.win = true; result.payout = Math.floor(winSym.value * mult);
        const other = SYMBOLS.LEMON;
        result.symbols = [winSym.icon, winSym.icon, other.icon].sort(() => Math.random() - 0.5);
      } else {
        result.symbols = [SYMBOLS.CHERRY.icon, SYMBOLS.LEMON.icon, SYMBOLS.BELL.icon];
        result.payout = 0;
      }
    } else if (itemId === 'ticket_mini') {
      const isWin = Math.random() < Math.min(0.8, 0.45 + luckBonus);
      if (isWin) {
        const wR = Math.random();
        let wSym = SYMBOLS.CASH;
        if(wR < 0.1) wSym = SYMBOLS.DIAMOND;
        else if(wR < 0.4) wSym = SYMBOLS.MONEY_BAG;
        
        result.win = true; result.payout = Math.floor(wSym.value * 2 * mult);
        result.symbols = [wSym.icon, wSym.icon, wSym.icon, SYMBOLS.CHERRY.icon, SYMBOLS.LEMON.icon].sort(() => Math.random() - 0.5);
      } else {
        result.symbols = [SYMBOLS.DIAMOND.icon, SYMBOLS.MONEY_BAG.icon, SYMBOLS.CASH.icon, SYMBOLS.CHERRY.icon, SYMBOLS.LEMON.icon];
      }
    } else if (itemId === 'ticket_apple') {
      let total = 0; let syms = [];
      for(let i=0; i<5; i++) {
        const r = Math.random();
        if (r < Math.max(0.05, 0.20 - luckBonus)) { syms.push(SYMBOLS.WORM); total += Math.floor(SYMBOLS.WORM.value * mult); }
        else if (r < 0.6) { syms.push(SYMBOLS.APPLE_G); total += Math.floor(SYMBOLS.APPLE_G.value * mult); }
        else if (r < 0.9) { syms.push(SYMBOLS.APPLE_R); total += Math.floor(SYMBOLS.APPLE_R.value * mult); }
        else { syms.push(SYMBOLS.APPLE_Y); total += Math.floor(SYMBOLS.APPLE_Y.value * mult); }
      }
      result.win = total > 0; result.payout = total; result.symbols = syms.map(s => s.icon);
    } else if (itemId === 'ticket_quick') {
      const isWin = Math.random() < Math.min(0.8, 0.40 + luckBonus);
      let basePayout = 0;
      if (isWin) {
        result.win = true; basePayout = Math.floor(SYMBOLS.CASH.value * mult);
        result.symbols = [SYMBOLS.CASH.icon, SYMBOLS.CASH.icon, SYMBOLS.CASH.icon, SYMBOLS.LEMON.icon, SYMBOLS.BELL.icon, SYMBOLS.CHERRY.icon].sort(() => Math.random() - 0.5);
      } else {
        result.symbols = [SYMBOLS.DIAMOND.icon, SYMBOLS.MONEY_BAG.icon, SYMBOLS.CASH.icon, SYMBOLS.CHERRY.icon, SYMBOLS.LEMON.icon, SYMBOLS.BELL.icon];
      }
      const bRand = Math.random(); let bonusObj = SYMBOLS.BONUS_NONE;
      if (bRand < 0.1 + luckBonus/5) bonusObj = SYMBOLS.BONUS_X2;
      else if (bRand < 0.4 + luckBonus/2) bonusObj = SYMBOLS.BONUS_PLUS;
      result.bonus = bonusObj.icon;
      if (isWin) {
        if (bonusObj === SYMBOLS.BONUS_X2) result.payout = basePayout * 2;
        else if (bonusObj === SYMBOLS.BONUS_PLUS) result.payout = basePayout + Math.floor(SYMBOLS.BONUS_PLUS.value * mult);
        else result.payout = basePayout;
      }
    } else if (itemId === 'ticket_cat') {
      let syms = []; let total = 0; let hasCat = false;
      for(let i=0; i<5; i++) {
        const r = Math.random();
        if (r < Math.max(0.02, 0.15 - luckBonus)) { syms.push(SYMBOLS.CAT.icon); total += Math.floor(SYMBOLS.CAT.value * mult); hasCat = true; }
        else if (r < 0.5) { syms.push(SYMBOLS.YARN.icon); total += Math.floor(SYMBOLS.YARN.value * mult); }
        else if (r < 0.9) { syms.push(SYMBOLS.FISH.icon); total += Math.floor(SYMBOLS.FISH.value * mult); }
        else { syms.push(SYMBOLS.PAW.icon); total += Math.floor(SYMBOLS.PAW.value * mult); }
      }
      result.symbols = syms; result.payout = total; result.win = total > 0;
    }

    const newItem = {
      uid: Math.random().toString(36).substr(2, 9),
      templateId: itemId,
      x: 200 + Math.random() * 200,
      y: 150 + Math.random() * 150,
      level: lvl, 
      mult: mult,
      scratched: false,
      waitingForReward: false,
      result: result
    };
    
    state.itemsOnTable.push(newItem);
    renderTableItems();
}

// --- ИВЕНТЫ ---
function handleReset() {

        playSound('click');
        localStorage.removeItem('scritchy_save_pixel_v4'); 
        state = {
            money: 0, itemsOnTable: [], floatingTexts: [], unlockedItems: ['plate'], unlockedGadgets: ['trash'],
            scratchedCount: 0, upgrades: JSON.parse(JSON.stringify(INITIAL_UPGRADES)), ticketExp: JSON.parse(JSON.stringify(INITIAL_TICKET_EXP)),
            phoneState: 'idle', phoneDialog: 0, currentPhoneMsg: '', isFanActive: false, fanAutoTimer: 0, leftTab: 'tickets',
            robotQueue: [], catState: 'sleeping', catTimer: 0, catTargetUid: null, catProgress: 0,
            activeScratchItem: null, draggedItem: null
        };
        renderAll();
    }
}

function handlePhoneClick() {
    playSound('click');
    if (state.phoneState === 'ringing') {
        state.phoneState = 'talking';
        state.phoneDialog = 0;
    } else if (state.phoneState === 'talking') {
        if (state.phoneDialog === 0) {
            state.phoneDialog = 1;
        } else {
            state.phoneState = 'idle';
            state.phoneDialog = 0;
            const nextProgression = PROGRESSION_STEPS.find(step => !state.unlockedItems.includes(step.unlock));
            if (nextProgression && !state.unlockedItems.includes(nextProgression.unlock)) {
                state.unlockedItems.push(nextProgression.unlock);
                saveGame(); 
            }
            renderStats();
            renderShop();
        }
    }
    renderPhone();
}

function buyGadget(id) {
    const g = GADGETS[id];
    if (state.money >= g.cost && !state.unlockedGadgets.includes(id)) {
        playSound('buy');
        state.money -= g.cost;
        state.unlockedGadgets.push(id);
        saveGame(); 
        renderStats();
        renderShop();
        renderGadgets();
    }
}

function buyUpgrade(id) {
    const u = state.upgrades[id];
    if (state.money >= u.cost && u.level < u.max) {
        playSound('buy');
        state.money -= u.cost;
        u.level++;
        u.cost = Math.floor(u.cost * 1.8);
        saveGame(); 
        renderStats();
        renderUpgrades();
    }
}

// DRAG & DROP И КЛИКИ
function handlePointerDown(e) {
    const target = e.target.closest('[data-uid]');
    if (!target) return;
    
    const uid = target.dataset.uid;
    const item = state.itemsOnTable.find(it => it.uid === uid);
    
    if (!item) return;

    if (item.waitingForReward) {
        playSound('click');
        openScratchModal(item, true); 
        state.itemsOnTable = state.itemsOnTable.filter(it => it.uid !== uid);
        renderTableItems();
        return;
    }

    if (!item.scratched) {
        playSound('click');
        const rect = elTableBounds.getBoundingClientRect();
        item.offsetX = e.clientX - rect.left - item.x;
        item.offsetY = e.clientY - rect.top - item.y;
        state.draggedItem = item;
        state._dragStartPos = { x: e.clientX, y: e.clientY };
    }
}

function handlePointerMove(e) {
    if (!state.draggedItem) return;
    const rect = elTableBounds.getBoundingClientRect();
    state.draggedItem.x = e.clientX - rect.left - state.draggedItem.offsetX;
    state.draggedItem.y = e.clientY - rect.top - state.draggedItem.offsetY;
    
    const domEl = document.querySelector(`[data-uid="${state.draggedItem.uid}"]`);
    if(domEl) {
        domEl.style.left = state.draggedItem.x + 'px';
        domEl.style.top = state.draggedItem.y + 'px';
        domEl.classList.add('scale-110', 'z-50', 'shadow-[6px_6px_0_rgba(0,0,0,0.6)]');
    }
}

function handlePointerUp(e) {
    if (!state.draggedItem) return;
    
    const isClick = state._dragStartPos && Math.abs(e.clientX - state._dragStartPos.x) < 5 && Math.abs(e.clientY - state._dragStartPos.y) < 5;
    
    if (isClick && !state.draggedItem.scratched) {
        openScratchModal(state.draggedItem);
        state.draggedItem = null;
        renderTableItems();
        return;
    }

    const cx = e.clientX, cy = e.clientY;
    const tRect = elTrashCan.style.display !== 'none' ? elTrashCan.getBoundingClientRect() : null;
    
    if (tRect && cx >= tRect.left && cx <= tRect.right && cy >= tRect.top && cy <= tRect.bottom) {
        playSound('click');
        state.itemsOnTable = state.itemsOnTable.filter(it => it.uid !== state.draggedItem.uid);
    } else {
        const robotEl = document.getElementById('robot-bounds');
        const rRect = robotEl ? robotEl.getBoundingClientRect() : null;
        if (rRect && cx >= rRect.left && cx <= rRect.right && cy >= rRect.top && cy <= rRect.bottom) {
            const cap = state.upgrades.robot_capacity.level + 1;
            if (state.robotQueue.length < cap) {
                playSound('click');
                state.robotQueue.push({ ...state.draggedItem, progress: 0 });
                state.itemsOnTable = state.itemsOnTable.filter(it => it.uid !== state.draggedItem.uid);
                renderGadgets();
            }
        }
    }
    
    state.draggedItem = null;
    renderTableItems();
}

function createFloatingText(val, x, y) {
    const div = document.createElement('div');
    div.className = `absolute z-50 font-black text-2xl drop-shadow-md pointer-events-none animate-float-up ${val > 0 ? 'text-green-400' : 'text-red-400'}`;
    div.style.left = (x + 10) + 'px';
    div.style.top = (y - 10) + 'px';
    
    let text = (val > 0 ? '+' : '') + val + '₽';
    if (val <= 0 && Math.random() > 0.6) {
        const funny = ['АУЧ!', 'ФИАСКО', 'БОЛЬ', 'ГДЕ ДЕНЬГИ?', 'МИНУС ВАЙБ'];
        text = funny[Math.floor(Math.random() * funny.length)] + '\n' + text;
    }
    div.innerText = text;
    
    elFloatingTexts.appendChild(div);
    setTimeout(() => div.remove(), 1500);
}

// --- ИНФО ПАНЕЛЬ ---
function getTicketChances(templateId, mult) {
    const v = (base) => Math.floor(base * mult) + '₽';
    const luckLvl = state.upgrades.luck.level;
    const luckBonus = (state.scratchedCount * 0.0005) + (luckLvl * 0.05);
    const formatPct = (p) => Math.max(0, Math.min(100, Math.round(p * 100))) + '%';

    switch(templateId) {
        case 'plate': {
            const winP = Math.min(0.99, 0.90 + luckBonus);
            return [
                {icon: '✨', prob: 'УСПЕХ', percent: formatPct(winP), val: v(3)},
                {icon: '💥', prob: 'ПРОВАЛ', percent: formatPct(1 - winP), val: v(-3)}
            ];
        }
        case 'ticket_2win': {
            const p1 = 0.02 + luckLvl*0.01 + luckBonus/10;
            const p2 = 0.15 + luckLvl*0.02 + luckBonus/5;
            const p3 = 0.40 + luckLvl*0.03 + luckBonus/2;
            const p4 = 0.60 + luckBonus;
            return [
                {icon: '💎', prob: 'ДЖЕКПОТ', percent: formatPct(p1), val: v(250)},
                {icon: '💰', prob: 'РЕДКО', percent: formatPct(p2 - p1), val: v(75)},
                {icon: '💵', prob: 'СРЕДНЕ', percent: formatPct(p3 - p2), val: v(25)},
                {icon: '🍒', prob: 'ЧАСТО', percent: formatPct(p4 - p3), val: v(10)},
                {icon: '❌', prob: 'ПРОИГРЫШ', percent: formatPct(1 - p4), val: '0₽'}
            ];
        }
        case 'ticket_mini': {
            const w = Math.min(0.8, 0.45 + luckBonus);
            return [
                {icon: '💎', prob: 'ДЖЕКПОТ', percent: formatPct(w * 0.1), val: v(500)},
                {icon: '💰', prob: 'РЕДКО', percent: formatPct(w * 0.3), val: v(150)},
                {icon: '💵', prob: 'ЧАСТО', percent: formatPct(w * 0.6), val: v(50)},
                {icon: '❌', prob: 'ПРОИГРЫШ', percent: formatPct(1 - w), val: '0₽'}
            ];
        }
        case 'ticket_apple': {
            const worm = Math.max(0.05, 0.20 - luckBonus);
            return [
                {icon: '🏆', prob: 'ЯЧЕЙКА', percent: formatPct(0.1), val: v(150)},
                {icon: '🍎', prob: 'ЯЧЕЙКА', percent: formatPct(0.3), val: v(40)},
                {icon: '🍏', prob: 'ЯЧЕЙКА', percent: formatPct(0.6 - worm), val: v(15)},
                {icon: '🐛', prob: 'ЯЧЕЙКА', percent: formatPct(worm), val: v(-20)}
            ];
        }
        case 'ticket_quick': {
            const w = Math.min(0.8, 0.40 + luckBonus);
            const b1 = 0.1 + luckBonus/5;
            const b2 = 0.4 + luckBonus/2;
            return [
                {icon: '💵', prob: 'ВЫИГРЫШ', percent: formatPct(w), val: v(25)},
                {icon: '✖️2', prob: 'БОНУС', percent: formatPct(b1), val: 'x2'},
                {icon: '➕100', prob: 'БОНУС', percent: formatPct(b2 - b1), val: '+'+v(100)}
            ];
        }
        case 'ticket_cat': {
            const cat = Math.max(0.02, 0.15 - luckBonus);
            return [
                {icon: '🐾', prob: 'ЯЧЕЙКА', percent: formatPct(0.1), val: v(60)},
                {icon: '🐟', prob: 'ЯЧЕЙКА', percent: formatPct(0.4), val: v(30)},
                {icon: '🧶', prob: 'ЯЧЕЙКА', percent: formatPct(0.5 - cat), val: v(10)},
                {icon: '🐱', prob: 'ЯЧЕЙКА', percent: formatPct(cat), val: v(-100)}
            ];
        }
    }
    return [];
}

    const t = SHOP_ITEMS[item.templateId];
    const chances = getTicketChances(item.templateId, item.mult);
    let html = `
        <div class="bg-[#362b22] p-4 text-center border-b-4 border-[#2c221a]">
             <h2 class="text-xl font-black tracking-wider text-white drop-shadow-md">${t.name}</h2>
             <div class="text-yellow-400 text-xs font-bold mt-1">УР. ${item.level}</div>
        </div>
        <div class="p-4 flex-1 overflow-y-auto custom-scrollbar">
            <p class="text-[10px] text-[#d4c3b3] mb-4 font-medium text-center leading-relaxed">"${t.desc}"</p>
            <div class="space-y-3">
    `;
    chances.forEach(c => {
        html += `
            <div class="flex items-center justify-between bg-[#3a3026] p-2 rounded-md border-4 border-[#1f1711] shadow-inner">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-[#2c221a] rounded flex items-center justify-center text-lg border-2 border-[#1f1711]">${c.icon}</div>
                    <span class="font-bold text-[9px] text-[#d4c3b3] uppercase">${c.prob} <span class="text-blue-300 ml-1">${c.percent}</span></span>
                </div>
                <span class="font-black text-sm drop-shadow-md ${c.val.includes('-') ? 'text-red-400' : 'text-green-400'}">${c.val}</span>
            </div>
        `;
    });
    html += `
            </div>
            <div class="mt-4 p-2 bg-[#2c221a] rounded-md border-4 border-[#1f1711] text-center shadow-inner">
               <div class="text-[8px] text-yellow-500 font-bold uppercase tracking-wider mb-1">МНОЖИТЕЛЬ</div>
               <div class="text-lg font-black text-yellow-400">x${item.mult.toFixed(2)}</div>
            </div>
        </div>
    `;
    document.getElementById('scratch-info-panel').innerHTML = html;
}

function checkJackpot(payout, item) {
    let isJackpot = false;
    if (item.templateId === 'ticket_2win' && payout >= Math.floor(SYMBOLS.DIAMOND.value * item.mult)) isJackpot = true;
    if (item.templateId === 'ticket_apple' && payout >= Math.floor(SYMBOLS.APPLE_Y.value * item.mult)) isJackpot = true;
    if (item.templateId === 'ticket_mini' && payout >= Math.floor(SYMBOLS.DIAMOND.value * 2 * item.mult)) isJackpot = true;
    if (payout >= 200 * item.mult) isJackpot = true;

    if (isJackpot) {
        playSound('jackpot');
        const jp = document.getElementById('ui-jackpot');
        jp.classList.remove('hidden');
        jp.classList.add('flex');
        setTimeout(() => {
            jp.classList.add('hidden');
            jp.classList.remove('flex');
        }, 3000);
    }
}

// --- СКРЕТЧ МОДАЛКА ---
let scratchCtx, scratchAreas, scratchRevealed, scratchCompleted, scratchIsDrawing;

function openScratchModal(item, autoReveal = false) {
    state.activeScratchItem = item;
    elScratchModal.classList.remove('hidden');
    elScratchModal.classList.add('flex');
    scratchCompleted = false;
    
    renderInfoPanel(item);

    const bg = document.getElementById('scratch-bg');
    bg.innerHTML = getScratchContentHTML(item);
    
    const payoutEl = document.getElementById('scratch-current-payout');
    payoutEl.innerText = '0₽';
    payoutEl.className = 'text-4xl font-black text-white transition-colors drop-shadow-md';
    
    const overlay = document.getElementById('scratch-result-overlay');
    overlay.classList.add('hidden');
    
    const canvas = document.getElementById('scratch-canvas');
    canvas.classList.remove('opacity-0');
    canvas.style.cursor = item.templateId === 'plate' ? 'crosshair' : 'pointer';

    scratchAreas = getScratchAreas(item.templateId);
    scratchRevealed = new Array(scratchAreas.length).fill(false);
    
    if (autoReveal) {
        scratchRevealed.fill(true);
        canvas.classList.add('opacity-0');
        const newPayout = calcCurrentPayout(scratchRevealed);
        
        overlay.classList.remove('hidden');
        overlay.classList.add('animate-bounce');
        
        if (item.result.win) {
             playSound('win');
             overlay.innerHTML = `<span class="bg-green-500 text-white px-8 py-4 rounded-md font-black text-4xl shadow-[4px_4px_0_rgba(0,0,0,1)] border-4 border-green-200">+${newPayout}₽!</span>`;
             checkJackpot(newPayout, item);
        } else {
             playSound('lose');
             overlay.innerHTML = `<span class="bg-red-500 text-white px-8 py-3 rounded-md font-bold text-2xl shadow-[4px_4px_0_rgba(0,0,0,1)] border-4 border-red-300">${newPayout < 0 ? newPayout + '₽' : 'НЕТ ВЫИГРЫША'}</span>`;
        }
        
        payoutEl.innerText = (newPayout > 0 ? '+' : '') + newPayout + '₽';
        payoutEl.className = `text-4xl font-black transition-colors drop-shadow-md ${newPayout < 0 ? 'text-red-500' : newPayout > 0 ? 'text-green-500' : 'text-white'}`;
        
        scratchCompleted = true;
        
        setTimeout(() => {
            state.money += newPayout;
            state.scratchedCount++;
            state.ticketExp[item.templateId] = (state.ticketExp[item.templateId] || 0) + 1; 
            saveGame(); 
            renderStats();
            renderShop(); 
            closeScratchModal();
        }, 2000);
    } else {
        initCanvas();
    }
}

function closeScratchModal() {
    elScratchModal.classList.add('hidden');
    elScratchModal.classList.remove('flex');
    state.activeScratchItem = null;
}

function getScratchAreas(templateId) {
    const w = 450, h = 400;
    switch(templateId) {
      case 'plate': return [{ type: 'circle', x: w/2, y: h/2, r: 180 }];
      case 'ticket_2win': return [{ type: 'rect', x: 50, y: 250, w: 90, h: 90, rx: 0 }, { type: 'rect', x: 180, y: 250, w: 90, h: 90, rx: 0 }, { type: 'rect', x: 310, y: 250, w: 90, h: 90, rx: 0 }];
      case 'ticket_mini': return [{ type: 'circle', x: 100, y: 150, r: 40 }, { type: 'circle', x: 225, y: 150, r: 40 }, { type: 'circle', x: 350, y: 150, r: 40 }, { type: 'circle', x: 160, y: 260, r: 40 }, { type: 'circle', x: 290, y: 260, r: 40 }];
      case 'ticket_apple': return [{ type: 'circle', x: 225, y: 100, r: 35 }, { type: 'circle', x: 120, y: 170, r: 35 }, { type: 'circle', x: 330, y: 170, r: 35 }, { type: 'circle', x: 160, y: 270, r: 35 }, { type: 'circle', x: 290, y: 270, r: 35 }];
      case 'ticket_quick': return [{ type: 'rect', x: 40, y: 120, w: 80, h: 80, rx: 0 }, { type: 'rect', x: 140, y: 120, w: 80, h: 80, rx: 0 }, { type: 'rect', x: 240, y: 120, w: 80, h: 80, rx: 0 }, { type: 'rect', x: 40, y: 220, w: 80, h: 80, rx: 0 }, { type: 'rect', x: 140, y: 220, w: 80, h: 80, rx: 0 }, { type: 'rect', x: 240, y: 220, w: 80, h: 80, rx: 0 }, { type: 'circle', x: 380, y: 210, r: 45 }];
      case 'ticket_cat': return [{ type: 'circle', x: 120, y: 100, r: 30 }, { type: 'circle', x: 225, y: 70, r: 30 }, { type: 'circle', x: 330, y: 100, r: 30 }, { type: 'circle', x: 80, y: 200, r: 30 }, { type: 'circle', x: 225, y: 240, r: 80 }];
      default: return [];
    }
}

function getScratchContentHTML(item) {
    const res = item.result;
    switch(item.templateId) {
      case 'ticket_2win':
        return `<div class="w-full h-full bg-[#5e8c79] relative shadow-inner">
            <div class="absolute inset-0 border-8 border-[#3e6354] pointer-events-none z-30"></div>
            <div class="absolute top-6 w-full text-center font-black text-[#f4ecd8] text-4xl drop-shadow-md tracking-widest">TWO $ WIN</div>
            <div class="absolute top-24 left-6 right-6 h-32 bg-[#a3c2b0] border-4 border-[#3e6354] overflow-hidden shadow-inner">
               <div class="absolute bottom-0 left-0 w-full h-24 bg-[#7da891]" style="clip-path: polygon(0 100%, 30% 0, 70% 100%)"></div>
               <div class="absolute bottom-0 right-0 w-2/3 h-32 bg-[#5e8c79]" style="clip-path: polygon(20% 100%, 60% 0, 100% 100%)"></div>
            </div>
            ${res.symbols.map((s, i) => `<div class="absolute w-[90px] h-[90px] bg-[#d8e6df] border-4 border-[#3e6354] flex items-center justify-center text-5xl shadow-inner" style="left: ${50 + i*130}px; top: 250px;">${s}</div>`).join('')}
          </div>`;
      case 'ticket_mini':
        return `<div class="w-full h-full bg-[#4287f5] relative shadow-inner">
            <div class="absolute inset-0 border-8 border-[#1e4fa8] pointer-events-none z-30"></div>
            <div class="absolute top-8 w-full text-center font-black text-white text-4xl drop-shadow-md rotate-[-2deg]">MINI SCRATCH</div>
            ${res.symbols.map((s, i) => {
                 const pos = [{x:100,y:150},{x:225,y:150},{x:350,y:150},{x:160,y:260},{x:290,y:260}][i];
                 return `<div class="absolute w-20 h-20 bg-white rounded-full border-4 border-[#1e4fa8] flex items-center justify-center text-4xl shadow-inner" style="left: ${pos.x-40}px; top: ${pos.y-40}px">${s}</div>`;
              }).join('')}
          </div>`;
      case 'ticket_apple':
        return `<div class="w-full h-full bg-[#87ceeb] relative overflow-hidden shadow-inner">
            <div class="absolute inset-0 border-8 border-[#2a7a2a] pointer-events-none z-30"></div>
            <div class="absolute bottom-0 w-full h-32 bg-[#8b4513] border-t-8 border-[#5c2a0c]"></div>
            <div class="absolute bottom-20 left-1/2 -translate-x-1/2 w-64 h-64 bg-[#2a7a2a] rounded-full border-8 border-[#1e5c1e] shadow-inner"></div>
            <div class="absolute top-6 w-full text-center font-black text-white text-3xl drop-shadow-md z-10 tracking-widest">APPLE TREE</div>
            ${res.symbols.map((s, i) => {
                 const pos = [{x:225,y:100},{x:120,y:170},{x:330,y:170},{x:160,y:270},{x:290,y:270}][i];
                 return `<div class="absolute w-[70px] h-[70px] bg-white rounded-full flex items-center justify-center text-4xl border-4 border-[#1e5c1e] shadow-inner z-10" style="left: ${pos.x-35}px; top: ${pos.y-35}px">${s}</div>`;
            }).join('')}
          </div>`;
      case 'ticket_quick':
        return `<div class="w-full h-full bg-[#b88c35] relative shadow-inner">
             <div class="absolute inset-0 border-8 border-[#7a5c21] pointer-events-none z-30"></div>
             <div class="absolute top-6 w-full text-center font-black text-white text-4xl drop-shadow-md">QUICK CASH</div>
             ${res.symbols.map((s, i) => {
                const cols = i % 3; const rows = Math.floor(i / 3);
                return `<div class="absolute w-[80px] h-[80px] bg-[#fff] border-4 border-[#7a5c21] flex items-center justify-center text-4xl shadow-inner" style="left: ${40 + cols*100}px; top: ${120 + rows*100}px">${s}</div>`
             }).join('')}
             <div class="absolute w-[110px] h-[180px] bg-[#7a5c21] border-4 border-[#5c4518] flex flex-col items-center justify-start pt-2 text-center text-white font-bold shadow-inner" style="left: 325px; top: 120px;">БОНУС!</div>
             <div class="absolute w-[90px] h-[90px] bg-white rounded-full flex items-center justify-center text-3xl text-black border-4 border-[#b88c35] shadow-inner z-10" style="left: 335px; top: 165px;">${res.bonus}</div>
          </div>`;
      case 'ticket_cat':
        return `<div class="w-full h-full bg-[#f4aeba] relative shadow-inner">
            <div class="absolute inset-0 border-8 border-[#91465e] pointer-events-none z-30"></div>
            <div class="absolute top-4 left-4 font-black text-[#91465e] text-3xl w-24 leading-none drop-shadow-md">LUCKY CAT</div>
            ${res.symbols.map((s, i) => {
                 const pos = [{x:120,y:100,r:30},{x:225,y:70,r:30},{x:330,y:100,r:30},{x:80,y:200,r:30},{x:225,y:240,r:80}][i];
                 return `<div class="absolute bg-[#fff] rounded-full flex items-center justify-center border-4 border-[#91465e] shadow-inner" style="left: ${pos.x-pos.r}px; top: ${pos.y-pos.r}px; width: ${pos.r*2}px; height: ${pos.r*2}px; font-size: ${pos.r>50?'60px':'30px'}">${s}</div>`;
            }).join('')}
          </div>`;
      default:
        return `<div class="w-full h-full bg-[#a0aec0] rounded-full relative overflow-hidden shadow-inner">
             <div class="absolute inset-0 border-[20px] border-[#718096] rounded-full pointer-events-none z-30"></div>
             <div class="absolute inset-0 border-[8px] border-dashed border-[#4a5568] rounded-full opacity-30 m-4"></div>
             <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center drop-shadow-md w-full flex flex-col items-center">
                <div class="text-6xl mb-2">${res.win ? '✨' : '💥'}</div>
                <div class="text-5xl font-black ${res.win ? 'text-green-400' : 'text-red-600'}">${res.payout}₽</div>
             </div>
          </div>`;
    }
}

function initCanvas() {
    const canvas = document.getElementById('scratch-canvas');
    scratchCtx = canvas.getContext('2d', { willReadFrequently: true });
    scratchCtx.clearRect(0, 0, 450, 400);
    scratchCtx.globalCompositeOperation = 'source-over';
    
    if (state.activeScratchItem.templateId === 'plate') {
      scratchCtx.fillStyle = '#f7d2b7'; scratchCtx.beginPath(); scratchCtx.arc(225, 200, 180, 0, Math.PI*2); scratchCtx.fill();
      scratchCtx.fillStyle = '#e6bc9a';
      for(let i=0; i<40; i++) { scratchCtx.beginPath(); scratchCtx.arc(50 + Math.random()*350, 50 + Math.random()*300, 15 + Math.random()*25, 0, Math.PI*2); scratchCtx.fill(); }
    } else {
      scratchAreas.forEach(area => {
        scratchCtx.fillStyle = '#a0aec0';
        if (area.type === 'rect') {
          if (area.rx) { scratchCtx.beginPath(); scratchCtx.roundRect(area.x, area.y, area.w, area.h, area.rx); scratchCtx.fill(); } 
          else { scratchCtx.fillRect(area.x, area.y, area.w, area.h); }
        } else if (area.type === 'circle') {
          scratchCtx.beginPath(); scratchCtx.arc(area.x, area.y, area.r, 0, Math.PI*2); scratchCtx.fill();
        }
        scratchCtx.fillStyle = '#718096';
        if (area.type === 'rect') {
           scratchCtx.font = 'bold 40px "Pixelify Sans"'; scratchCtx.textAlign = 'center'; scratchCtx.textBaseline = 'middle'; scratchCtx.fillText('?', area.x + area.w/2, area.y + area.h/2);
        } else {
           scratchCtx.font = 'bold ' + (area.r > 50 ? '60px' : '30px') + ' "Pixelify Sans"'; scratchCtx.textAlign = 'center'; scratchCtx.textBaseline = 'middle'; scratchCtx.fillText('?', area.x, area.y);
        }
      });
    }
}

function handleScratchStart(e) { scratchIsDrawing = true; startScratchSound(); handleScratchMove(e); }
function handleScratchEnd(e) { scratchIsDrawing = false; stopScratchSound(); }

function handleScratchMove(e) {
    if (!scratchIsDrawing || scratchCompleted) return;
    
    const canvas = document.getElementById('scratch-canvas');
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const x = (cx - rect.left) * (canvas.width / rect.width);
    const y = (cy - rect.top) * (canvas.height / rect.height);

    scratchCtx.globalCompositeOperation = 'destination-out';
    scratchCtx.beginPath();
    
    // РАЗМЕР СТИРАНИЯ
    const baseR = state.activeScratchItem.templateId === 'plate' ? 30 : 15;
    const currentR = baseR + (state.upgrades.scratch_size.level * 5);
    scratchCtx.arc(x, y, currentR, 0, Math.PI * 2);

    // СИЛА СТИРАНИЯ (Прозрачность кисти)
    const strength = 0.2 + (state.upgrades.scratch_strength.level * 0.16);
    scratchCtx.globalAlpha = Math.min(1, strength);

    scratchCtx.fill();
    scratchCtx.globalAlpha = 1.0;

    if (Math.random() < 0.2) checkClearance();
}

function calcCurrentPayout(rev) {
    const item = state.activeScratchItem;
    if (item.templateId === 'plate') return rev[0] ? item.result.payout : 0;
    
    const syms = item.result.symbols;
    const getValue = (icon) => {
        const base = Object.values(SYMBOLS).find(s => s.icon === icon)?.value || 0;
        return typeof base === 'number' ? Math.floor(base * item.mult) : base;
    };

    if (item.templateId === 'ticket_apple' || item.templateId === 'ticket_cat') {
      let total = 0; rev.forEach((isRev, i) => { if (isRev) total += getValue(syms[i]); });
      return total;
    }
    if (item.templateId === 'ticket_2win') {
      const counts = {};
      for(let i=0; i<3; i++) {
         if (rev[i]) { counts[syms[i]] = (counts[syms[i]] || 0) + 1; if (counts[syms[i]] >= 2) return getValue(syms[i]); }
      }
      return 0;
    }
    if (item.templateId === 'ticket_mini') {
      const counts = {};
      for(let i=0; i<5; i++) {
         if (rev[i]) { counts[syms[i]] = (counts[syms[i]] || 0) + 1; if (counts[syms[i]] >= 3) return getValue(syms[i]) * 2; }
      }
      return 0;
    }
    if (item.templateId === 'ticket_quick') {
      const counts = {}; let base = 0;
      for(let i=0; i<6; i++) {
         if (rev[i]) { counts[syms[i]] = (counts[syms[i]] || 0) + 1; if (counts[syms[i]] >= 3) base = getValue(syms[i]); }
      }
      if (base > 0 && rev[6]) { 
         const bonusIcon = item.result.bonus;
         if (bonusIcon === SYMBOLS.BONUS_X2.icon) return base * 2;
         if (bonusIcon === SYMBOLS.BONUS_PLUS.icon) return base + Math.floor(SYMBOLS.BONUS_PLUS.value * item.mult);
      }
      return base;
    }
    return 0;
}

function checkClearance() {
    const imgData = scratchCtx.getImageData(0, 0, 450, 400).data;
    let newlyRevealed = false;

    scratchAreas.forEach((a, i) => {
      if (scratchRevealed[i]) return;
      let sx, sy, sw, sh;
      if (a.type === 'rect') { sx=a.x; sy=a.y; sw=a.w; sh=a.h; } else { sx=a.x-a.r; sy=a.y-a.r; sw=a.r*2; sh=a.r*2; }
      
      sx = Math.max(0, Math.floor(sx)); sy = Math.max(0, Math.floor(sy));
      sw = Math.min(450 - sx, Math.floor(sw)); sh = Math.min(400 - sy, Math.floor(sh));

      let remainingOpaque = 0; let pixelsChecked = 0;
      for (let y = sy; y < sy + sh; y += 4) {
        for (let x = sx; x < sx + sw; x += 4) {
          const alphaIdx = (y * 450 + x) * 4 + 3;
          if (imgData[alphaIdx] > 128) remainingOpaque++;
          pixelsChecked++;
        }
      }
      
      if ((100 - ((remainingOpaque / pixelsChecked) * 100)) > 60) {
          scratchRevealed[i] = true;
          newlyRevealed = true;
      }
    });

    if (newlyRevealed) {
       const newPayout = calcCurrentPayout(scratchRevealed);
       const payoutEl = document.getElementById('scratch-current-payout');
       payoutEl.innerText = (newPayout > 0 ? '+' : '') + newPayout + '₽';
       payoutEl.className = `text-4xl font-black transition-colors drop-shadow-md ${newPayout < 0 ? 'text-red-500' : newPayout > 0 ? 'text-green-500' : 'text-white'}`;
       
       if (scratchRevealed.every(r => r) && !scratchCompleted) {
          scratchCompleted = true;
          stopScratchSound();
          document.getElementById('scratch-canvas').classList.add('opacity-0');
          
          if(state.activeScratchItem.templateId !== 'plate') {
              const overlay = document.getElementById('scratch-result-overlay');
              overlay.classList.remove('hidden');
              overlay.classList.add('animate-bounce');
              
              if(state.activeScratchItem.result.win) {
                 playSound('win');
                 overlay.innerHTML = `<span class="bg-green-500 text-white px-8 py-4 rounded-md font-black text-4xl shadow-[4px_4px_0_rgba(0,0,0,1)] border-4 border-green-200">+${newPayout}₽!</span>`;
                 checkJackpot(newPayout, state.activeScratchItem);
              } else {
                 playSound('lose');
                 overlay.innerHTML = `<span class="bg-red-500 text-white px-8 py-3 rounded-md font-bold text-2xl shadow-[4px_4px_0_rgba(0,0,0,1)] border-4 border-red-300">${newPayout < 0 ? newPayout + '₽' : 'НЕТ ВЫИГРЫША'}</span>`;
              }
          } else {
              if (state.activeScratchItem.result.win) playSound('win');
              else playSound('lose');
          }

          setTimeout(() => {
             const finishedUid = state.activeScratchItem.uid;
             
             state.money += newPayout;
             state.scratchedCount++;
             state.ticketExp[state.activeScratchItem.templateId] = (state.ticketExp[state.activeScratchItem.templateId] || 0) + 1; 
             saveGame(); 
             renderStats();
             renderShop(); 
             closeScratchModal();
             
             setTimeout(() => {
                 state.itemsOnTable = state.itemsOnTable.filter(it => it.uid !== finishedUid);
                 renderTableItems();
             }, 1500);

          }, 1500);
       }
    }
}

// Запуск
window.onload = init;
</script>
